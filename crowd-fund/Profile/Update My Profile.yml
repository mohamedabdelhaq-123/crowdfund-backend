info:
  name: Update My Profile
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{baseUrl}}/users/me/"
  body:
    type: json
    data: |-
      {
        "first_name": "Rana",
        "country": "Egypt"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
