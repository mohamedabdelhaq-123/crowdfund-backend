info:
  name: Delete My Account
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/users/me/"
  body:
    type: json
    data: |-
      {
        "password": "your_password_here"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
