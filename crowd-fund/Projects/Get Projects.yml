info:
  name: Get Projects
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/projects/?page=10"
  params:
    - name: page
      value: "10"
      type: query

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
