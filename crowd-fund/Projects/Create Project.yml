info:
  name: Create Project
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/projects/"
  body:
    type: multipart-form
    data:
      - name: title
        type: text
        value: SpaceX Mars Colony
      - name: start_date
        type: text
        value: 2026-05-01
      - name: end_date
        type: text
        value: 2026-12-31
      - name: details
        type: text
        value: A project to fund the first pizza shop on Mars.
      - name: target
        type: text
        value: "100000.0"
      - name: current_money
        type: text
        value: "0"
      - name: is_featured
        type: text
        value: "false"
      - name: image
        type: file
        value:
          - /Users/andrewemad/Downloads/154-1546602_logo-linux-linux-logo-first.jpg
      - name: status
        type: text
        value: pending
      - name: category
        type: text
        value: "2"
      - name: user
        type: text
        value: "18"
      - name: created_at
        type: text
        value: ""
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
